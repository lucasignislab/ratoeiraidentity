<!-- Success Alert (Temporary) -->
<div class="success-alert" *ngIf="showSuccessAlert">
    <span class="success-message">Use o código do seu aplicativo autenticador.</span>
    <button type="button" class="close-alert" (click)="dismissAlert()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
            <path
                d="M6.28 5.22a.75.75 0 0 0-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 1 0 1.06 1.06L10 11.06l3.72 3.72a.75.75 0 1 0 1.06-1.06L11.06 10l3.72-3.72a.75.75 0 0 0-1.06-1.06L10 8.94 6.28 5.22Z" />
        </svg>
    </button>
</div>

<div class="view-header">
    <button class="back-btn" routerLink="../sso">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
            stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
        </svg>
    </button>
    <h1 class="view-title">Código de verificação</h1>
    <p class="view-subtitle">Digite o código do seu aplicativo autenticador</p>
</div>

<form class="mfa-form">
    <div class="r-input-group">
        <label>Código de 6 dígitos</label>

        <div class="code-inputs" (paste)="onPaste($event)">
            <input *ngFor="let digit of code; let i = index; trackBy: trackByIndex" #digitInput type="text"
                class="code-digit" maxlength="1" inputmode="numeric" pattern="[0-9]*" [value]="code[i]"
                (input)="onInput($event, i)" (keydown)="onKeyDown($event, i)" />
        </div>
    </div>

    <button type="button" class="r-btn r-btn-primary enter-btn" routerLink="../accounts">
        Verificar
    </button>
</form>
