<div class="view-header">
    <h1 class="view-title">Central de contas</h1>
    <p class="view-subtitle">Suas contas vinculadas ao acesso único</p>
</div>

<div class="accounts-grid">
    <!-- Mock Active Account 1 (Pages) -->
    <button class="account-item active">
        <div class="acc-logo pages-logo">
            <img src="mascotepages.png" alt="Pages Logo" class="acc-logo-img">
        </div>
    </button>

    <!-- Mock Active Account 2 (Ads) -->
    <button class="account-item">
        <div class="acc-logo ads-logo">
            <img src="MASCOTE SEM FUNDO AMARELO.png" alt="Ads Logo" class="acc-logo-img">
        </div>
    </button>
</div>

<div class="account-list-container">
    <div class="account-row disabled">
        <span class="acc-name">Pages</span>
        <span class="badge-status">Inativo</span>
    </div>
</div>

<button class="add-account-btn">
    <div class="icon-box">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
            stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
        </svg>
    </div>
    <span>Vincular outra conta</span>
</button>
